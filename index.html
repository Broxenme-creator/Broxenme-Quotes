<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BROXENME</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap');
:root {
    --bg: #060606; --text: #ffffff; --card: rgba(22, 22, 22, 0.7);
    --accent: #ADFF2F; --muted: #888; --nav-bg: rgba(10, 10, 10, 0.85);
    --teal: #007A7A; --purple: #8B5CF6;
}
.light { --bg: #f2f2f2; --text: #0a0a0a; --card: rgba(255, 255, 255, 0.7); --accent: #6aff00; --muted: #666; --nav-bg: rgba(255, 255, 255, 0.85); }
* { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
body { background: var(--bg); color: var(--text); min-height: 100vh; transition: 0.3s; padding-top: 70px; }
.glass { background: var(--card); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px); border: 1px solid rgba(255,255,255,0.08); }

nav { display: flex; justify-content: space-between; align-items: center; padding: 0.8rem 5%; background: var(--nav-bg); backdrop-filter: blur(25px); position: fixed; top: 0; width: 100%; z-index: 1000; border-bottom: 1px solid rgba(255,255,255,0.05); }
.nav-logo { display: flex; align-items: center; gap: 10px; cursor: pointer; font-weight: 800; font-size: 1.5rem; }
.nav-logo.icon { background: linear-gradient(135deg, var(--accent), var(--purple)); width: 38px; height: 38px; border-radius: 12px; display: flex; align-items: center; justify-content: center; color: #000; }
nav ul { display: flex; gap: 2rem; list-style: none; }
nav a { color: var(--text); text-decoration: none; cursor: pointer; font-weight: 600; transition: 0.2s; }
nav a:hover { color: var(--accent); }
.nav-right { display: flex; gap: 0.8rem; align-items: center; }
.nav-btn { background: var(--accent); border: none; color: #000; padding: 0.6rem 1.3rem; border-radius: 30px; cursor: pointer; font-weight: 700; }
#themeToggle { background: none; border: 2px solid var(--accent); color: var(--accent); border-radius: 50%; cursor: pointer; width: 42px; height: 42px; display: flex; align-items: center; justify-content: center; }
.hamburger { display: none; cursor: pointer; font-size: 1.5rem; }
.page { display: none; min-height: 85vh; animation: fadeIn 0.4s ease; }
.page.active { display: block; }
@keyframes fadeIn { from {opacity: 0; transform: translateY(15px)} to {opacity: 1; transform: translateY(0)} }

.hero { display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; min-height: 70vh; padding: 2rem 5%; background: linear-gradient(135deg, #8B5CF6, #EC4899); border-radius: 24px; margin: 1rem; }
#dailyQuote { font-size: clamp(1.5rem, 4vw, 2.2rem); color: white; max-width: 700px; font-weight: 700; }

.btn { background: var(--accent); color: #000; padding: 0.9rem 1.8rem; border: none; border-radius: 14px; cursor: pointer; font-weight: 700; transition: 0.2s; width: 100%; font-size: 1rem; }
.btn:hover { transform: translateY(-2px); filter: brightness(1.1); }
.btn-outline { background: transparent; border: 2px solid var(--accent); color: var(--accent); padding: 0.8rem 1.2rem; border-radius: 14px; cursor: pointer; width: 100%; font-weight: 600; }
.card { background: var(--card); padding: 2rem; border-radius: 20px; max-width: 700px; margin: 2rem auto; }
.card input,.card textarea,.card select { width: 100%; padding: 1rem; margin: 0.6rem 0; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1); background: rgba(0,0,0,0.2); color: var(--text); outline: none; font-size: 1rem; }
label { display: block; font-weight: 600; margin-top: 1rem; margin-bottom: 0.4rem; color: var(--muted); font-size: 0.9rem; }

.reels-viewer { height: calc(100vh - 70px); overflow-y: scroll; scroll-snap-type: y mandatory; }
.reel-full { height: calc(100vh - 70px); width: 100%; max-width: 480px; margin: 0 auto; background-size: cover; background-position: center; position: relative; scroll-snap-align: start; display: flex; align-items: center; justify-content: center; }
.reel-text { font-size: clamp(1.6rem, 6vw, 2.8rem); font-weight: 800; text-align: center; color: white; text-shadow: 2px 2px 15px rgba(0,0,0,0.9); width: 90%; }
.reel-sidebar { position: absolute; right: 1rem; bottom: 120px; display: flex; flex-direction: column; gap: 1.8rem; }
.reel-action { text-align: center; color: white; cursor: pointer; font-size: 1.8rem; }
.reel-action span { font-size: 0.9rem; display: block; font-weight: bold; }
.reel-bottom { display: flex; align-items: center; gap: 0.8rem; position: absolute; bottom: 20px; left: 1rem; background: rgba(0,0,0,0.5); padding: 0.6rem 1.2rem; border-radius: 20px; }
.reel-profile { width: 42px; height: 42px; border-radius: 50%; border: 2px solid var(--accent); object-fit: cover; }
.reel-tags { position: absolute; top: 80px; left: 1rem; display: flex; gap: 0.5rem; flex-wrap: wrap; }
.reel-tag { background: rgba(0,0,0,0.6); padding: 0.3rem 0.8rem; border-radius: 20px; font-size: 0.8rem; }
.reel-song { position: absolute; bottom: 70px; left: 1rem; color: white; font-size: 0.9rem; background: rgba(0,0,0,0.5); padding: 0.3rem 0.8rem; border-radius: 20px; }
.comments-panel { position: absolute; bottom: 0; left: 0; width: 100%; max-height: 40%; background: var(--card); backdrop-filter: blur(20px); border-radius: 20px 20px 0 0; padding: 1rem; display: none; flex-direction: column; }
.comments-panel.active { display: flex; }

.profile-wrapper { max-width: 900px; margin: 1rem auto; background: var(--card); border-radius: 0; overflow: hidden; }
.profile-header { height: 200px; background: linear-gradient(135deg, #00ff88, #00d4ff); position: relative; }
.profile-pic-wrap { position: absolute; bottom: -70px; left: 50%; transform: translateX(-50%); }
.profile-pic { width: 140px; height: 140px; border-radius: 50%; border: 5px solid var(--card); object-fit: cover; background: #222; }
.camera-btn { position: absolute; bottom: 8px; right: 8px; background: var(--accent); border-radius: 50%; width: 38px; height: 38px; display: flex; align-items: center; justify-content: center; cursor: pointer; color: #000; }
.profile-info { padding: 90px 2rem 2rem; text-align: center; }
.profile-stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1.5rem; margin: 2rem 0; }

@media(max-width:600px){
   .profile-stats{ 
       grid-template-columns: repeat(2, 1fr); 
   }
}

.stat h3 { font-size: 1.8rem; color: var(--accent); font-weight: 800; }

.modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 2000; align-items: center; justify-content: center; padding: 1rem; }
.modal.active { display: flex; }
.modal-content { background: var(--card); padding: 2rem; border-radius: 24px; width: 100%; max-width: 520px; max-height: 90vh; overflow-y: auto; }
.modal-header { display: flex; align-items: center; gap: 0.8rem; margin-bottom: 1.5rem; font-size: 1.4rem; font-weight: 700; }
.form-group { margin-bottom: 1.2rem; }
.quote-preview { width: 100%; aspect-ratio: 1; border-radius: 20px; display: flex; align-items: center; justify-content: center; padding: 1.5rem; margin: 1.2rem 0; text-align: center; font-size: 1.4rem; font-weight: bold; color: white; }
.bg-selector,.font-selector,.tag-selector { display: grid; grid-template-columns: repeat(auto-fit, minmax(80px, 1fr)); gap: 0.8rem; margin: 1rem 0; }
.bg-option { width: 100%; aspect-ratio: 1; border-radius: 14px; cursor: pointer; border: 3px solid transparent; transition: 0.2s; }
.bg-option.active { border-color: var(--accent); transform: scale(1.05); }
.font-btn,.tag-btn { padding: 0.7rem; border: 2px solid rgba(255,255,255,0.1); border-radius: 12px; cursor: pointer; background: rgba(0,0,0,0.2); color: var(--text); font-weight: 600; transition: 0.2s; }
.font-btn.active,.tag-btn.active { background: var(--accent); color: #000; border-color: var(--accent); }
#songResults div { padding: 0.8rem; border-radius: 10px; cursor: pointer; }
#songResults div:hover { background: rgba(255,255,255,0.05); }

.community-container { max-width: 700px; margin: 0 auto; padding: 1rem 5%; }
.community-tabs { display: flex; gap: 1rem; margin-bottom: 1.5rem; border-bottom: 1px solid var(--muted); }
.comm-tab { padding: 1rem; cursor: pointer; font-weight: bold; }
.comm-tab.active { color: var(--accent); border-bottom: 3px solid var(--accent); }
.feed-card { background: var(--card); padding: 1.2rem; border-radius: 15px; margin: 1rem 0; }
.feed-header { display: flex; gap: 1rem; align-items: center; margin-bottom: 1rem; }
.chat-item { display: flex; gap: 1rem; padding: 1rem; border-bottom: 1px solid rgba(255,255,255,0.1); cursor: pointer; border-radius: 12px; }
.chat-window { display: none; position: fixed; top: 70px; left: 0; width: 100%; height: calc(100vh - 70px); background: var(--bg); z-index: 999; flex-direction: column; }
.chat-window.active { display: flex; }
.chat-messages { flex: 1; overflow-y: auto; padding: 1rem; display: flex; flex-direction: column; gap: 0.5rem; }
.msg { padding: 0.8rem 1rem; border-radius: 15px; margin: 0.5rem 0; max-width: 70%; }
.msg.me { background: var(--teal); align-self: flex-end; }
.msg.other { background: var(--card); align-self: flex-start; }

@media (max-width: 950px) {
    nav ul { position: fixed; top: 70px; left: -100%; width: 100%; height: calc(100vh - 70px); background: var(--bg); flex-direction: column; align-items: center; padding-top: 3rem; transition: 0.3s; gap: 2rem; font-size: 1.2rem; }
    nav ul.active { left: 0; }
  .hamburger { display: block; }
}
</style>
</head>
<body>
<nav>
    <div class="nav-logo" onclick="showPage('homePage')"><div class="icon"><i class="fa fa-quote-left"></i></div>BROXENME</div>
    <ul id="navMenu">
        <li><a onclick="showPage('homePage')"><i class="fa fa-home"></i> Home</a></li>
        <li><a onclick="showPage('reelsPage')"><i class="fa fa-play"></i> Reels</a></li>
        <li><a onclick="showPage('generatorPage')"><i class="fa fa-wand-magic-sparkles"></i> Generator</a></li>
        <li><a onclick="showPage('communityPage')"><i class="fa fa-users"></i> Community</a></li>
        <li><a onclick="showPage('profilePage')"><i class="fa fa-user"></i> Profile</a></li>
    </ul>
    <div class="nav-right">
        <button class="nav-btn" id="authBtn" onclick="showPage('loginPage')">Login</button>
        <button id="themeToggle"><i class="fa fa-gear"></i></button>
        <div class="hamburger" onclick="toggleMenu()"><i class="fa fa-bars"></i></div>
    </div>
</nav>

<div id="homePage" class="page active"><section class="hero"><h2>Daily Inspiration</h2><p id="dailyQuote">"Loading..."</p><button class="btn" onclick="newDailyQuote()" style="width:auto;margin-top:1.5rem"><i class="fa fa-refresh"></i> New Quote</button></section></div>

<div id="reelsPage" class="page">
    <div style="max-width:600px;margin:1rem auto;padding:0 5%">
        <input type="text" id="searchInput" placeholder="🔍 Search quotes, tags, users..." oninput="searchQuotes()" style="width:100%;padding:1rem 1.5rem;border-radius:25px;border:1px solid var(--accent);background:var(--card);color:var(--text);outline:none">
    </div>
    <div class="reels-viewer" id="reelsViewer"></div>
</div>

<div id="generatorPage" class="page">
    <div class="card glass" style="text-align:center">
        <h2><i class="fa fa-wand-magic-sparkles"></i> Quote Generator</h2>
        <div class="form-group">
            <label>Category</label>
            <select id="categorySelect"><option value="motivation">Motivation</option><option value="life">Life</option><option value="business">Business</option><option value="love">Love</option></select>
        </div>
        <button class="btn" onclick="generateQuote()">Generate <i class="fa fa-sparkles"></i></button>
        <p id="generatedQuote" style="margin-top:2rem;font-size:1.4rem;color:var(--accent);font-weight:600">Click generate</p>
    </div>
</div>

<div id="loginPage" class="page">
    <div class="card glass">
        <h2>Welcome to Broxenme</h2>
        <div class="form-group"><label>Email</label><input type="email" id="loginEmail" placeholder="you@email.com"></div>
        <div class="form-group"><label>Password</label><input type="password" id="loginPass" placeholder="********"></div>
        <button class="btn" onclick="login()">Login</button>
        <button class="btn-outline" style="margin-top:0.8rem" onclick="signup()">Sign Up</button>
    </div>
</div>

<div id="profilePage" class="page">
    <div class="profile-wrapper glass">
        <div class="profile-header">
            <div class="profile-pic-wrap">
                <img src="https://placehold.co/140" class="profile-pic" id="profilePic">
                <input type="file" id="profileUpload" accept="image/*" style="display:none">
                <div class="camera-btn" onclick="document.getElementById('profileUpload').click()"><i class="fa fa-camera"></i></div>
            </div>
        </div>
        <div class="profile-info">
            <h2 id="profileName">Guest</h2>
            <p style="color:var(--muted)"><i class="fa fa-location-dot" style="color:red"></i> <span id="profileLocation">Harare, ZW</span></p>
            <div class="profile-stats">
                <div class="stat"><h3 id="postCount">0</h3><p>Posts</p></div>
                <div class="stat"><h3 id="followerCount">0</h3><p>Followers</p></div>
                <div class="stat"><h3 id="followingCount">0</h3><p>Following</p></div>
                <div class="stat"><h3 id="totalLikes">0</h3><p>Likes</p></div>
            </div>
            <p id="profileBio" style="color:var(--muted);margin:1rem 0"></p>
            <button class="btn" onclick="openEditProfile()"><i class="fa fa-pen"></i> Edit Profile</button>
            <button class="btn" style="margin-top:0.8rem" onclick="openCreatePostModal()"><i class="fa fa-plus"></i> Create Post</button>
            <div style="display:grid;grid-template-columns:repeat(auto-fit, minmax(160px, 1fr));gap:12px;margin-top:2rem" id="profileGrid"></div>
        </div>
    </div>
</div>

<div id="createPostModal" class="modal">
    <div class="modal-content glass">
        <div class="modal-header"><i class="fa fa-pen-to-square"></i> Create Quote Post</div>
        <div class="form-group"><label>Your Quote</label><textarea id="newPostText" placeholder="Write something inspiring..." rows="3" oninput="updatePreview()"></textarea></div>
        <div class="form-group"><label>Background</label><input type="file" id="bgImageUpload" accept="image/*" onchange="uploadBgImage(event)"><div class="bg-selector" id="gradientPicker" style="margin-top:1rem"></div></div>
        <div class="form-group"><label>Font Style</label><div class="font-selector" id="fontPicker"></div></div>
        <div class="form-group"><label>Tags</label><div class="tag-selector"><button class="tag-btn" onclick="toggleTag(this, 'Motivation')">#Motivation</button><button class="tag-btn" onclick="toggleTag(this, 'Life')">#Life</button><button class="tag-btn" onclick="toggleTag(this, 'Love')">#Love</button><button class="tag-btn" onclick="toggleTag(this, 'Success')">#Success</button><button class="tag-btn" onclick="toggleTag(this, 'Business')">#Business</button></div></div>
        <div class="form-group"><label>Song</label><input type="text" id="songSearch" placeholder="Search song..." oninput="searchSong(this.value)"><div id="songResults" style="max-height:120px;overflow-y:auto;margin-top:0.5rem"></div></div>
        <div class="quote-preview" id="quotePreview">Your quote here</div>
        <button class="btn" style="margin-top:1rem" onclick="submitPost()">Post Quote</button>
        <button class="btn-outline" style="margin-top:0.8rem" onclick="closeCreatePostModal()">Cancel</button>
    </div>
</div>

<div id="editProfileModal" class="modal">
    <div class="modal-content glass">
        <div class="modal-header"><i class="fa fa-user-pen"></i> Edit Profile</div>
        <div class="form-group"><label>Full Name</label><input type="text" id="editName" placeholder="Enter your name"></div>
        <div class="form-group"><label>Location</label><input type="text" id="editLocation" placeholder="City, Country"></div>
        <div class="form-group"><label>Bio</label><textarea id="editBio" placeholder="Tell us about you" rows="3"></textarea></div>
        <button class="btn" onclick="saveProfile()">Save Changes</button>
        <button class="btn-outline" style="margin-top:0.8rem" onclick="closeEditProfile()">Cancel</button>
    </div>
</div>

<div id="communityPage" class="page">
    <div class="community-container">
        <div class="community-tabs">
            <div class="comm-tab active" onclick="switchCommTab('feed', event)"><i class="fa fa-newspaper"></i> Feed</div>
            <div class="comm-tab" onclick="switchCommTab('messages', event)"><i class="fa fa-message"></i> Messages</div>
        </div>
        <div id="feedTab"><div id="communityFeed"></div></div>
        <div id="messagesTab" style="display:none">
            <button class="btn" onclick="openNewChat()" style="width:auto"><i class="fa fa-plus"></i> New Message</button>
            <div class="chat-list" id="chatList"></div>
        </div>
    </div>
</div>

<div id="chatWindow" class="chat-window">
    <div class="chat-header glass" style="display:flex;align-items:center;gap:1rem;padding:1rem">
        <button onclick="closeChat()" style="background:none;border:none;color:var(--text);font-size:1.2rem"><i class="fa fa-arrow-left"></i></button>
        <img src="https://placehold.co/50" style="width:45px;height:45px;border-radius:50%" id="chatAvatar">
        <b id="chatName">Chat</b>
    </div>
    <div class="chat-messages" id="chatMessages"></div>
    <div class="chat-input-bar glass" style="display:flex;gap:0.5rem;padding:1rem">
        <input type="text" id="chatInput" placeholder="Message..." style="flex:1;padding:1rem;border-radius:20px;background:var(--card);color:var(--text);border:1px solid var(--accent);outline:none">
        <button class="btn" onclick="sendMsg()" style="width:auto"><i class="fa fa-paper-plane"></i></button>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
<script>
const firebaseConfig = {apiKey: "AIzaSyDC7MtlDi8Sl7ai3GjEnh06AoR7hZV_4Vs",authDomain: "broxenme-quotes.firebaseapp.com",projectId: "broxenme-quotes",storageBucket: "broxenme-quotes.firebasestorage.app",messagingSenderId: "625885740482",appId: "1:625885740482:web:fce8637986109f8ab82a5b"};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const auth = firebase.auth();

let currentUser = null, selectedBg = 'linear-gradient(135deg, #667eea, #764ba2)', selectedFont = 'Poppins', selectedTagsArr = [], currentChat = null, allPosts = [];

const fonts = ['Poppins','Georgia','Arial','Impact','Courier New','Trebuchet MS','Verdana','Times New Roman','Comic Sans MS','Roboto'];
const gradients = ['linear-gradient(135deg, #667eea, #764ba2)','linear-gradient(135deg, #f093fb, #f5576c)','linear-gradient(135deg, #43e97b, #38f9d7)','linear-gradient(135deg, #fa709a, #fee140)','linear-gradient(135deg, #30cfd0, #330867)','linear-gradient(135deg, #a8edea, #fed6e3)','linear-gradient(135deg, #ff9a9e, #fecfef)','linear-gradient(135deg, #ffecd2, #fcb69f)'];
document.getElementById('fontPicker').innerHTML = fonts.map(f=>`<button class="font-btn" onclick="selectFont(this, '${f}')">${f.split(' ')[0]}</button>`).join('');
document.getElementById('gradientPicker').innerHTML = gradients.map(g=>`<div class="bg-option" style="background:${g}" onclick="selectBg(this, '${g}')"></div>`).join('');

auth.onAuthStateChanged(user => { if(user){ currentUser=user; document.getElementById('authBtn').innerText='Logout'; document.getElementById('authBtn').onclick=logout; loadUserData(); loadPosts(); loadChats(); loadCommunityFeed(); showPage('reelsPage'); } else { currentUser=null; document.getElementById('authBtn').innerText='Login'; document.getElementById('authBtn').onclick=()=>showPage('loginPage'); showPage('homePage'); }});
function login(){ auth.signInWithEmailAndPassword(document.getElementById('loginEmail').value, document.getElementById('loginPass').value).catch(e=>alert(e.message)); }
function signup(){ const email=document.getElementById('loginEmail').value; const pass=document.getElementById('loginPass').value; auth.createUserWithEmailAndPassword(email, pass).then(cred=>{ db.collection('users').doc(cred.user.uid).set({name: email.split('@')[0], bio:'', location:'Harare, ZW', photoURL:'', followers:0, following:0}); }); }
function logout(){ auth.signOut(); }

async function newDailyQuote(){ try{const res = await fetch('https://api.quotable.io/random'); const data = await res.json(); document.getElementById('dailyQuote').innerText = `"${data.content}"`;}catch(e){document.getElementById('dailyQuote').innerText='"Stay grinding"';}}
newDailyQuote();
async function generateQuote(){ const cat = document.getElementById('categorySelect').value; const res = await fetch(`https://api.quotable.io/random?tags=${cat}`); const data = await res.json(); document.getElementById('generatedQuote').innerText = `"${data.content}"`; }

async function uploadBgImage(e){ const file=e.target.files[0]; const formData=new FormData(); formData.append("image",file); const res=await fetch("https://api.imgbb.com/1/upload?key=0eba1dca60f5f8b89d986216b93ba4a4",{method:"POST",body:formData}); const data=await res.json(); selectedBg=`url(${data.data.url})`; updatePreview(); }
async function searchSong(q){ if(q.length<3) return; const res=await fetch(`https://itunes.apple.com/search?term=${q}&limit=5`); const data=await res.json(); document.getElementById('songResults').innerHTML=data.results.map(s=>`<div onclick="selectSong('${s.trackName} - ${s.artistName}')">${s.trackName} - ${s.artistName}</div>`).join(''); }
function selectSong(s){ document.getElementById('songSearch').value=s; document.getElementById('songResults').innerHTML=''; }

async function likePost(id){ if(!currentUser)return; const userLikeRef=db.collection('likes').doc(currentUser.uid+'_'+id); const doc=await userLikeRef.get(); if(doc.exists){ await userLikeRef.delete(); await db.collection('posts').doc(id).update({likes:firebase.firestore.FieldValue.increment(-1)}); } else { await userLikeRef.set({}); await db.collection('posts').doc(id).update({likes:firebase.firestore.FieldValue.increment(1)}); }}
function toggleComments(postId){ document.getElementById('comments_'+postId).classList.toggle('active'); }
async function addComment(postId){ const text=document.getElementById('commentInput_'+postId).value; if(!text) return; db.collection('posts').doc(postId).collection('comments').add({text, author:currentUser.email.split('@')[0], time:firebase.firestore.FieldValue.serverTimestamp()}); document.getElementById('commentInput_'+postId).value=''; }

function loadPosts(){ db.collection('posts').orderBy('time','desc').onSnapshot(snapshot=>{ allPosts=[]; document.getElementById('reelsViewer').innerHTML=''; document.getElementById('profileGrid').innerHTML=''; let postCount=0; let totalLikes=0;
snapshot.forEach(doc=>{ const p=doc.data(); p.id=doc.id; allPosts.push(p);
document.getElementById('reelsViewer').innerHTML+=`<div class="reel-full" style="background:${p.bg}"><div class="reel-text" style="font-family:${p.font}">${p.text}</div><div class="reel-tags">${(p.tags||[]).map(t=>`<span class="reel-tag">#${t}</span>`).join('')}</div>${p.song?`<div class="reel-song"><i class="fa fa-music"></i> ${p.song}</div>`:''}<div class="reel-sidebar"><div class="reel-action" onclick="likePost('${doc.id}')"><i class="fa fa-heart"></i><span>${p.likes}</span></div><div class="reel-action" onclick="toggleComments('${doc.id}')"><i class="fa fa-comment"></i></div></div><div class="reel-bottom"><img src="${p.authorPic}" class="reel-profile"><b>${p.authorName}</b></div><div class="comments-panel" id="comments_${doc.id}"><div id="commentList_${doc.id}"></div><div style="display:flex;gap:0.5rem;margin-top:auto"><input type="text" id="commentInput_${doc.id}" placeholder="Add comment..." style="flex:1;padding:0.8rem;border-radius:10px"><button onclick="addComment('${doc.id}')">Send</button></div></div></div>`;
if(p.authorId===currentUser?.uid){ document.getElementById('profileGrid').innerHTML+=`<div style="background:${p.bg};font-family:${p.font};aspect-ratio:1;border-radius:16px;display:flex;align-items:center;justify-content:center;padding:1rem;text-align:center;font-weight:bold;color:white">${p.text}</div>`; postCount++; totalLikes+=p.likes; }
}); document.getElementById('postCount').innerText=postCount; document.getElementById('totalLikes').innerText=totalLikes; });}

function openNewChat(){ const username=prompt('Enter @username to chat with:'); if(!username) return; db.collection('chats').add({users:[currentUser.uid], name:username, pic:'https://placehold.co/50', lastMsg:''}); }
function toggleTag(el,tag){el.classList.toggle('active');selectedTagsArr.includes(tag)?selectedTagsArr=selectedTagsArr.filter(t=>t!=tag):selectedTagsArr.push(tag);}
function selectBg(el,bg){document.querySelectorAll('.bg-option').forEach(b=>b.classList.remove('active'));el.classList.add('active');selectedBg=bg;updatePreview();}
function selectFont(el,font){document.querySelectorAll('.font-btn').forEach(b=>b.classList.remove('active'));el.classList.add('active');selectedFont=font;updatePreview();}
function updatePreview(){const p=document.getElementById('quotePreview');p.style.background=selectedBg;p.style.fontFamily=selectedFont;p.innerText=document.getElementById('newPostText').value||'Your quote here';}
function openCreatePostModal(){document.getElementById('createPostModal').classList.add('active');}
function closeCreatePostModal(){document.getElementById('createPostModal').classList.remove('active');}
function submitPost(){const text=document.getElementById('newPostText').value;const song=document.getElementById('songSearch').value;if(!text)return alert('Write a quote first!');db.collection('posts').add({text,bg:selectedBg,font:selectedFont,tags:selectedTagsArr,song,authorId:currentUser.uid,authorName:currentUser.email.split('@')[0],authorPic:currentUser.photoURL||'https://placehold.co/40',time:firebase.firestore.FieldValue.serverTimestamp(),likes:0,shares:0});closeCreatePostModal();}
function showPage(id){document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));document.getElementById(id).classList.add('active');document.getElementById('navMenu').classList.remove('active');}
function toggleMenu(){document.getElementById('navMenu').classList.toggle('active');}
function openEditProfile(){document.getElementById('editName').value=document.getElementById('profileName').innerText;document.getElementById('editLocation').value=document.getElementById('profileLocation').innerText;document.getElementById('editBio').value=document.getElementById('profileBio').innerText;document.getElementById('editProfileModal').classList.add('active');}
function closeEditProfile(){document.getElementById('editProfileModal').classList.remove('active');}
function saveProfile(){ db.collection('users').doc(currentUser.uid).update({ name:document.getElementById('editName').value, location:document.getElementById('editLocation').value, bio:document.getElementById('editBio').value }).then(()=>{loadUserData();closeEditProfile();}); }
function loadUserData(){ db.collection('users').doc(currentUser.uid).get().then(doc=>{ if(doc.exists){ const data=doc.data(); document.getElementById('profileName').innerText=data.name; document.getElementById('profileBio').innerText=data.bio; document.getElementById('profileLocation').innerText=data.location; document.getElementById('followerCount').innerText=data.followers||0; document.getElementById('followingCount').innerText=data.following||0; if(data.photoURL)document.getElementById('profilePic').src=data.photoURL; } }); }

document.getElementById('profileUpload').addEventListener('change', async (e)=>{ const file=e.target.files[0]; if(!file||!currentUser)return; const formData=new FormData();formData.append("image",file); const res=await fetch("https://api.imgbb.com/1/upload?key=0eba1dca60f5f8b89d986216b93ba4a4",{method:"POST",body:formData}); const data=await res.json(); const url=data.data.url; document.getElementById('profilePic').src=url; db.collection('users').doc(currentUser.uid).update({photoURL:url}); });

function loadCommunityFeed(){ 
    db.collection('posts').orderBy('time','desc').onSnapshot(snapshot=>{ 
        document.getElementById('communityFeed').innerHTML=''; 
        snapshot.forEach(doc=>{ 
            const p=doc.data(); 
            document.getElementById('communityFeed').innerHTML+=`<div class="feed-card glass"><div class="feed-header"><img src="${p.authorPic}" style="width:40px;height:40px;border-radius:50%"><b>${p.authorName}</b></div><p>${p.text}</p></div>`; 
        }); 
    }); 
}

function loadChats(){ 
    if(!currentUser)return; 
    db.collection('chats').where('users','array-contains',currentUser.uid).onSnapshot(snap=>{ 
        document.getElementById('chatList').innerHTML=''; 
        snap.forEach(doc=>{ 
            const c=doc.data(); 
            document.getElementById('chatList').innerHTML+=`<div class="chat-item" onclick="openChat('${doc.id}','${c.name}','${c.pic}')"><img src="${c.pic}" style="width:50px;height:50px;border-radius:50%"><div><b>${c.name}</b><p style="color:var(--muted);font-size:0.9rem">${c.lastMsg||''}</p></div></div>`; 
        }); 
    }); 
}

function openChat(id,name,pic){ currentChat=id; document.getElementById('chatName').innerText=name; document.getElementById('chatAvatar').src=pic; document.getElementById('chatWindow').classList.add('active'); db.collection('chats').doc(id).collection('messages').orderBy('time').onSnapshot(snap=>{ document.getElementById('chatMessages').innerHTML=''; snap.forEach(doc=>{ const m=doc.data(); const isMe=m.from===currentUser.uid; document.getElementById('chatMessages').innerHTML+=`<div class="msg ${isMe?'me':'other'}">${m.text}</div>`; }); document.getElementById('chatMessages').scrollTop=document.getElementById('chatMessages').scrollHeight; }); }

function closeChat(){ document.getElementById('chatWindow').classList.remove('active'); }
function sendMsg(){ const text=document.getElementById('chatInput').value; if(!text||!currentChat)return; db.collection('chats').doc(currentChat).collection('messages').add({text,from:currentUser.uid,time:firebase.firestore.FieldValue.serverTimestamp()}); db.collection('chats').doc(currentChat).update({lastMsg:text}); document.getElementById('chatInput').value=''; }

function switchCommTab(tab,e){ document.querySelectorAll('.comm-tab').forEach(t=>t.classList.remove('active')); e.target.classList.add('active'); document.getElementById('feedTab').style.display=tab==='feed'?'block':'none'; document.getElementById('messagesTab').style.display=tab==='messages'?'block':'none'; }

function searchQuotes(){ const q=document.getElementById('searchInput').value.toLowerCase(); const filtered=allPosts.filter(p=>p.text.toLowerCase().includes(q)||(p.tags||[]).join().toLowerCase().includes(q)||p.authorName.toLowerCase().includes(q)); document.getElementById('reelsViewer').innerHTML=filtered.map(p=>`<div class="reel-full" style="background:${p.bg}"><div class="reel-text" style="font-family:${p.font}">${p.text}</div></div>`).join('')||'<p style="text-align:center;padding:2rem">No results</p>'; }

document.getElementById('themeToggle').onclick=()=>{document.body.classList.toggle('light');const theme=document.body.classList.contains('light')?'light':'dark';localStorage.setItem('theme',theme);}
if(localStorage.getItem('theme')==='light')document.body.classList.add('light');

</script>
</body>
</html>
