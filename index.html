<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BROXENME – The Ultimate Quote Social Platform</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&display=swap');

        :root {
            --bg: #060606;
            --text: #ffffff;
            --card: rgba(22, 22, 22, 0.7);
            --accent: #ADFF2F;
            --muted: #999;
            --nav-bg: rgba(8, 8, 8, 0.92);
            --purple: #8B5CF6;
            --danger: #ff4757;
            --success: #2ed573;
            --whatsapp: #075E54;
            --whatsapp-light: #25D366;
            --glass-border: rgba(255,255,255,0.08);
            --gold: #FFD700;
            --blue-check: #1DA1F2;
        }
        .light {
            --bg: #f0f2f5;
            --text: #111;
            --card: rgba(255, 255, 255, 0.85);
            --accent: #4CAF50;
            --muted: #667781;
            --nav-bg: rgba(255, 255, 255, 0.95);
            --glass-border: rgba(0,0,0,0.06);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background: var(--bg); color: var(--text); min-height: 100vh; transition: 0.3s; padding-top: 60px; overflow-x: hidden; }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 10px; }

        .glass { background: var(--card); backdrop-filter: blur(20px); border: 1px solid var(--glass-border); border-radius: 16px; }
        .glass-heavy { background: var(--card); backdrop-filter: blur(30px); border: 1px solid var(--glass-border); border-radius: 20px; }

        nav { display: flex; justify-content: space-between; align-items: center; padding: 0.5rem 3%; background: var(--nav-bg); backdrop-filter: blur(25px); position: fixed; top: 0; width: 100%; z-index: 1000; border-bottom: 1px solid var(--glass-border); }
        .nav-logo { display: flex; align-items: center; gap: 8px; cursor: pointer; font-weight: 900; font-size: 1.3rem; }
        .nav-logo .icon { background: linear-gradient(135deg, var(--accent), var(--purple)); width: 35px; height: 35px; border-radius: 10px; display: flex; align-items: center; justify-content: center; color: #000; font-size: 1rem; }
        nav ul { display: flex; gap: 0.6rem; list-style: none; align-items: center; }
        nav ul li a { color: var(--text); text-decoration: none; cursor: pointer; font-weight: 600; transition: 0.2s; font-size: 0.82rem; padding: 0.5rem 0.7rem; border-radius: 18px; display: flex; align-items: center; gap: 0.3rem; }
        nav ul li a:hover { color: var(--accent); background: rgba(173,255,47,0.06); }
        .nav-right { display: flex; gap: 0.5rem; align-items: center; }
        .nav-btn { background: var(--accent); border: none; color: #000; padding: 0.45rem 1rem; border-radius: 22px; cursor: pointer; font-weight: 700; font-size: 0.82rem; transition: 0.2s; }
        .nav-btn:hover { transform: translateY(-2px); }
        #themeToggle { background: none; border: 2px solid var(--accent); color: var(--accent); border-radius: 50%; cursor: pointer; width: 35px; height: 35px; display: flex; align-items: center; justify-content: center; }
        .hamburger { display: none; cursor: pointer; font-size: 1.3rem; }

        .page { display: none; min-height: 85vh; animation: fadeIn 0.4s ease; }
        .page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .hero-full { display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; min-height: calc(100vh - 60px); background-size: cover; background-position: center; position: relative; }
        .hero-full::before { content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.7); z-index: 1; }
        .hero-full > * { position: relative; z-index: 2; }
        .hero-full h1 { font-size: clamp(2.2rem, 5vw, 4rem); font-weight: 900; color: white; }
        .hero-full h1 span { background: linear-gradient(135deg, var(--accent), #00d4ff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .daily-quote-box { background: rgba(0,0,0,0.5); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.12); border-radius: 18px; padding: 1.8rem; max-width: 550px; width: 90%; margin: 1.5rem 0; }
        #dailyQuote { font-size: clamp(1rem, 2.5vw, 1.3rem); color: white; font-weight: 600; line-height: 1.6; }

        .btn { background: var(--accent); color: #000; padding: 0.7rem 1.5rem; border: none; border-radius: 12px; cursor: pointer; font-weight: 700; transition: 0.2s; font-size: 0.88rem; display: inline-flex; align-items: center; gap: 0.4rem; justify-content: center; }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(173,255,47,0.25); }
        .btn-outline { background: transparent; border: 2px solid var(--accent); color: var(--accent); padding: 0.7rem 1.5rem; border-radius: 12px; cursor: pointer; font-weight: 600; }
        .btn-outline:hover { background: var(--accent); color: #000; }
        .btn-small { padding: 0.4rem 0.9rem; font-size: 0.78rem; width: auto; border-radius: 8px; }
        .btn-danger { background: var(--danger); color: white; }

        /* Reels */
        .reels-container { height: calc(100vh - 60px); overflow-y: scroll; scroll-snap-type: y mandatory; }
        .reel-slide { height: calc(100vh - 60px); width: 100%; scroll-snap-align: start; position: relative; background-size: cover; background-position: center; display: flex; align-items: center; justify-content: center; }
        .reel-overlay { position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: linear-gradient(0deg, rgba(0,0,0,0.85) 0%, rgba(0,0,0,0.1) 50%, rgba(0,0,0,0.3) 100%); }
        .reel-content { position: relative; z-index: 2; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: flex-end; padding: 1rem 4rem 2rem 1rem; }
        .reel-text { font-size: clamp(1.2rem, 4vw, 2rem); font-weight: 800; color: white; text-shadow: 2px 2px 15px rgba(0,0,0,0.9); margin-bottom: 0.5rem; }
        .reel-actions { position: absolute; right: 0.8rem; bottom: 120px; display: flex; flex-direction: column; gap: 1.2rem; z-index: 5; }
        .reel-action { display: flex; flex-direction: column; align-items: center; gap: 0.2rem; cursor: pointer; }
        .reel-action .icon-circle { width: 44px; height: 44px; border-radius: 50%; background: rgba(0,0,0,0.45); backdrop-filter: blur(8px); display: flex; align-items: center; justify-content: center; color: white; font-size: 1.3rem; border: 1px solid rgba(255,255,255,0.15); }
        .reel-action.liked .icon-circle { background: rgba(255,71,87,0.5); color: #ff4757; }
        .reel-action span { color: white; font-size: 0.65rem; font-weight: 700; }
        .progress-bar { position: absolute; top: 10px; left: 10px; right: 10px; height: 3px; background: rgba(255,255,255,0.2); border-radius: 2px; z-index: 10; }
        .progress-fill { height: 100%; background: var(--accent); border-radius: 2px; width: 0%; transition: width 0.1s linear; }

        /* Comments */
        .comments-panel { position: absolute; bottom: 0; left: 0; width: 100%; max-height: 50%; background: rgba(0,0,0,0.96); backdrop-filter: blur(20px); border-radius: 20px 20px 0 0; padding: 1rem; display: none; flex-direction: column; z-index: 20; animation: slideUp 0.3s ease; }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        .comments-panel.active { display: flex; }

        /* Chat */
        .chat-window { display: none; position: fixed; top: 60px; left: 0; width: 100%; height: calc(100vh - 60px); background: var(--bg); z-index: 999; flex-direction: column; }
        .chat-window.active { display: flex; }
        .chat-header { display: flex; align-items: center; gap: 0.8rem; padding: 0.7rem; background: var(--whatsapp); color: white; }
        .chat-messages { flex: 1; overflow-y: auto; padding: 1rem; background: #1a1a2e; display: flex; flex-direction: column; gap: 0.3rem; }
        .msg { padding: 0.5rem 0.8rem; border-radius: 8px; max-width: 75%; font-size: 0.9rem; }
        .msg.me { background: #dcf8c6; color: #000; align-self: flex-end; }
        .msg.other { background: white; color: #000; align-self: flex-start; }

        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 2000; align-items: center; justify-content: center; padding: 0.5rem; }
        .modal.active { display: flex; }
        .modal-content { background: var(--card); backdrop-filter: blur(25px); border: 1px solid var(--glass-border); padding: 1.5rem; border-radius: 20px; width: 100%; max-width: 500px; max-height: 85vh; overflow-y: auto; }

        .toast-container { position: fixed; top: 70px; right: 15px; z-index: 5000; display: flex; flex-direction: column; gap: 6px; }
        .toast { padding: 0.7rem 1.1rem; border-radius: 10px; color: white; font-weight: 600; backdrop-filter: blur(20px); animation: slideIn 0.3s ease; font-size: 0.8rem; }
        .toast.success { background: rgba(46,213,115,0.9); }
        .toast.error { background: rgba(255,71,87,0.9); }
        .toast.info { background: rgba(0,122,122,0.9); }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

        @media (max-width: 768px) {
            nav ul { position: fixed; top: 60px; left: -100%; width: 100%; height: calc(100vh - 60px); background: var(--bg); flex-direction: column; align-items: center; padding-top: 2rem; transition: 0.3s; gap: 1.2rem; z-index: 999; }
            nav ul.active { left: 0; }
            .hamburger { display: block; }
            .reel-actions { right: 0.3rem; bottom: 90px; gap: 0.8rem; }
            .reel-action .icon-circle { width: 36px; height: 36px; font-size: 1rem; }
        }
    </style>
</head>
<body>
    <div class="toast-container" id="toastContainer"></div>
    <nav>
        <div class="nav-logo" onclick="showPage('homePage')"><div class="icon"><i class="fa fa-quote-right"></i></div>BROXENME</div>
        <ul id="navMenu">
            <li><a onclick="showPage('homePage')"><i class="fa fa-home"></i> Home</a></li>
            <li><a onclick="showPage('reelsPage')"><i class="fa fa-play"></i> Reels</a></li>
            <li><a onclick="showPage('communityPage')"><i class="fa fa-users"></i> Community</a></li>
            <li><a onclick="showPage('discoverPage')"><i class="fa fa-compass"></i> Discover</a></li>
            <li><a onclick="showPage('profilePage')"><i class="fa fa-user"></i> Profile</a></li>
        </ul>
        <div class="nav-right">
            <button class="nav-btn" id="authBtn" onclick="showPage('loginPage')">Login</button>
            <button id="themeToggle"><i class="fa fa-moon"></i></button>
            <div class="hamburger" onclick="toggleMenu()"><i class="fa fa-bars"></i></div>
        </div>
    </nav>

    <!-- All pages are built dynamically via JavaScript to keep code clean -->
    <div id="app"></div>

    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>

    <script>
        // ==================== FIREBASE CONFIG ====================
        const firebaseConfig = {
            apiKey: "AIzaSyDC7MtlDi8Sl7ai3GjEnh06AoR7hZV_4Vs",
            authDomain: "broxenme-quotes.firebaseapp.com",
            projectId: "broxenme-quotes",
            storageBucket: "broxenme-quotes.firebasestorage.app",
            messagingSenderId: "625885740482",
            appId: "1:625885740482:web:fce8637986109f8ab82a5b"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();
        db.enablePersistence().catch(() => {});

        const IMGBB_KEY = '78883b1360bb85b347b444b05aa56826'; // Replace with your key
        const ADMIN_UID = 'lGCfuMhmsdSh1yBcXrtrgStsvq13'; // Replace with your admin UID

        // ==================== GLOBAL STATE ====================
        let currentUser = null,
            allPosts = [],
            unsubs = [],
            audio = null,
            currentGroup = null,
            viewedProfileUid = null,
            profileTab = 'posts',
            reelIndex = 0,
            reelProgressInterval;

        // ==================== UTILS ====================
        function toast(m, t = 'info') {
            const c = document.getElementById('toastContainer');
            const d = document.createElement('div');
            d.className = `toast ${t}`;
            d.innerHTML = `<i class="fa fa-${t==='success'?'check-circle':t==='error'?'times-circle':'info-circle'}"></i> ${m}`;
            c.appendChild(d);
            setTimeout(() => { d.style.opacity = '0'; d.style.transition = '0.3s'; setTimeout(() => d.remove(), 300); }, 3000);
        }

        function san(s) { const d = document.createElement('div'); d.textContent = s || ''; return d.innerHTML; }

        function clean() { unsubs.forEach(u => { try { u(); } catch (e) {} }); unsubs = []; }

        // ==================== AUTH ====================
        auth.onAuthStateChanged(u => {
            if (u) {
                currentUser = u;
                document.getElementById('authBtn').innerText = 'Logout';
                document.getElementById('authBtn').onclick = logout;
                initApp();
            } else {
                clean();
                currentUser = null;
                document.getElementById('authBtn').innerText = 'Login';
                document.getElementById('authBtn').onclick = () => showPage('login');
                renderLoginPage();
            }
        });

        function login() {
            const e = document.getElementById('loginEmail').value.trim(),
                p = document.getElementById('loginPass').value;
            if (!e || !p) return toast('Fill all fields', 'error');
            auth.signInWithEmailAndPassword(e, p).then(() => toast('Welcome!', 'success')).catch(err => toast(err.message, 'error'));
        }

        function signup() {
            const e = document.getElementById('loginEmail').value.trim(),
                p = document.getElementById('loginPass').value;
            if (!e || !p) return toast('Fill all fields', 'error');
            if (p.length < 6) return toast('Password too short', 'error');
            auth.createUserWithEmailAndPassword(e, p).then(c => {
                db.collection('users').doc(c.user.uid).set({
                    name: e.split('@')[0],
                    username: e.split('@')[0].toLowerCase(),
                    bio: '',
                    location: 'Harare, ZW',
                    photoURL: '',
                    followers: 0,
                    following: 0,
                    savedPosts: [],
                    createdAt: firebase.firestore.FieldValue.serverTimestamp(),
                    isVerified: false,
                    website: '',
                    streak: 0,
                    topQuote: '',
                    achievements: []
                });
                toast('Account created!', 'success');
            }).catch(err => toast(err.message, 'error'));
        }

        function logout() { clean(); if (audio) { audio.pause(); audio.remove(); audio = null; } auth.signOut(); }

        // ==================== RENDERING ====================
        function initApp() {
            buildAllPages();
            loadPosts();
            loadGroups();
            loadFeed();
            loadAccounts();
            showPage('reels');
            setupBots();
        }

            const app = document.getElementById('app');
            app.innerHTML = `

                        <input type="text" id="searchInput" placeholder="🔍 Search quotes..." oninput="searchQuotes()" style="width:100%;max-width:400px;padding:0.6rem 1.2rem;border-radius:22px;border:1px solid rgba(255,255,255,0.2);background:rgba(0,0,0,0.4);backdrop-filter:blur(15px);color:white;outline:none">

                </div>

                <!-- Community -->
                <div class="page" id="communityPage" style="max-width:650px;margin:0 auto;padding:0.5rem">
                    <div style="display:flex;gap:0.4rem;margin-bottom:0.8rem">
                        <button class="btn btn-small active" id="tabFeedBtn" onclick="switchCommTab('feed')">📰 Feed</button>
                        <button class="btn btn-small" id="tabGroupsBtn" onclick="switchCommTab('groups')">💬 Groups</button>
                    </div>
                    <div id="feedSection">
                        <button class="btn btn-outline" onclick="openCreateFeed()" style="width:100%;margin-bottom:0.5rem">+ Create Post</button>
                        <div id="communityFeed"></div>

                    <div id="groupsSection" style="display:none">

                    <div style="display:flex;gap:0.5rem;flex-wrap:wrap;margin-bottom:1rem" id="categoryChips"></div>

                        <div id="profileCover" style="height:180px;background-size:cover;background-position:center;position:relative">

                                <img src="https://placehold.co/100" id="profilePic" style="width:100px;height:100px;border-radius:50%;border:4px solid var(--card);object-fit:cover">
                                <input type="file" id="profileUpload" accept="image/*" style="display:none" onchange="uploadProfilePic(event)">
                                <button id="profilePicBtn" onclick="document.getElementById('profileUpload').click()" style="position:absolute;bottom:5px;right:5px;background:var(--accent);color:#000;border-radius:50%;width:28px;height:28px;border:none;cursor:pointer;font-size:0.7rem"><i class="fa fa-camera"></i></button>
                            </div>
                        </div>
                        <div style="padding:60px 1.5rem 1.5rem;text-align:center">
                            <h2 id="profileName">Guest <i class="fa fa-check-circle" style="color:var(--blue-check);font-size:1rem;display:none" id="verifyBadge"></i></h2>
                            <p id="profileLocation">📍 Harare, ZW</p>

                            <div style="margin:0.5rem 0"><span id="streakBadge" style="background:rgba(255,165,0,0.2);padding:0.3rem 0.8rem;border-radius:15px;font-size:0.8rem">🔥 0 Day Streak</span></div>

                <!-- Edit Profile Modal -->

                        <input type="text" id="editLocation" placeholder="Location" style="width:100%;padding:0.8rem;margin:0.5rem 0;border-radius:10px;border:1px solid var(--glass-border);background:rgba(0,0,0,0.2);color:var(--text)">
                        <input type="text" id="editWebsite" placeholder="Website/IG link" style="width:100%;padding:0.8rem;margin:0.5rem 0;border-radius:10px;border:1px solid var(--glass-border);background:rgba(0,0,0,0.2);color:var(--text)">
                        <textarea id="editBio" placeholder="Bio" style="width:100%;padding:0.8rem;margin:0.5rem 0;border-radius:10px;border:1px solid var(--glass-border);background:rgba(0,0,0,0.2);color:var(--text);resize:vertical"></textarea>
                        <button class="btn" onclick="saveProfile()" style="width:100%">Save</button>
                        <button class="btn-outline" onclick="closeEditProfile()" style="width:100%;margin-top:0.4rem">Cancel</button>
                    </div>
                </div>

                <!-- Chat Window -->
                <div id="chatWindow" class="chat-window">
                    <div class="chat-header">
                        <button onclick="closeChat()" style="background:none;border:none;color:white;font-size:1.2rem;cursor:pointer">←</button>
                        <img src="https://placehold.co/38" id="chatAvatar" style="width:38px;height:38px;border-radius:50%">
                        <div><b id="chatTitle">Group</b><div style="font-size:0.7rem;opacity:0.8">online</div></div>
                    </div>
                    <div class="chat-messages" id="chatMessages"></div>
                    <div class="chat-input" style="display:flex;gap:0.5rem;padding:0.6rem;background:var(--card)">
                        <input type="text" id="chatInput" placeholder="Type a message..." onkeypress="if(event.key==='Enter')sendMsg()" style="flex:1;padding:0.6rem;border-radius:20px;border:none;outline:none">
                        <button onclick="sendMsg()" style="background:var(--whatsapp-light);color:white;border:none;border-radius:50%;width:40px;height:40px;cursor:pointer"><i class="fa fa-paper-plane"></i></button>
                    </div>
                </div>
            `;

            // Initialize daily quote and UI elements
            newDailyQuote();
            document.getElementById('themeToggle').addEventListener('click', () => {
                document.body.classList.toggle('light');
                localStorage.setItem('theme', document.body.classList.contains('light') ? 'light' : 'dark');
            });
            if (localStorage.getItem('theme') === 'light') document.body.classList.add('light');
        }

        function renderLoginPage() {
            // Already built, just show login page
            showPage('login');
        }

        // ==================== NAVIGATION ====================
        function showPage(page) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            const targetMap = {
                'home': 'homePage',
                'reels': 'reelsPage',
                'community': 'communityPage',
                'discover': 'discoverPage',
                'profile': 'profilePage',
                'login': 'loginPage'
            };
            const id = targetMap[page] || page;
            const el = document.getElementById(id);
            if (el) el.classList.add('active');
            if (page === 'home') setHeroBg();
            if (page === 'profile') {
                if (!viewedProfileUid) viewedProfileUid = currentUser?.uid;
                setProfileBg();
                loadUser();
                loadPosts();
            }
            if (page === 'reels') loadPosts();
            if (page === 'discover') loadDiscover();
            document.getElementById('navMenu')?.classList.remove('active');
        }

        function toggleMenu() { document.getElementById('navMenu').classList.toggle('active'); }

        // ==================== DAILY QUOTE ====================
        async function newDailyQuote() {
            const q = document.getElementById('dailyQuote'),
                a = document.getElementById('quoteAuthor');
            try {
                const r = await fetch('https://api.quotable.io/random');
                const d = await r.json();
                q.innerText = `"${d.content}"`;
                a.innerText = `— ${d.author}`;
            } catch (e) {
                q.innerText = '"Stay inspired!"';
                a.innerText = '';
            }
        }

        // ==================== REELS SYSTEM ====================
        function loadPosts() {
            if (!currentUser) return;
            clean();
            const unsub = db.collection('posts').orderBy('time', 'desc').limit(50).onSnapshot(snap => {
                allPosts = [];
                const viewer = document.getElementById('reelsViewer');
                if (!viewer) return;
                viewer.innerHTML = '';
                reelIndex = 0;
                snap.forEach(doc => {
                    const p = doc.data();
                    p.id = doc.id;
                    allPosts.push(p);
                    viewer.innerHTML += buildReelHTML(p, doc.id);
                });
                updateReelCounter();
                if (allPosts.length > 0) startProgressSimulation();
            });
            unsubs.push(unsub);
        }

        function buildReelHTML(p, id) {
            return `
            <div class="reel-slide" style="background:${p.bg}" id="reel-${id}">
                <div class="progress-bar"><div class="progress-fill" id="progress-${id}"></div></div>
                <div class="reel-overlay"></div>
                <div class="reel-content">
                    <div class="reel-text">${san(p.text)}</div>
                    <div class="reel-tags" style="margin:0.3rem 0">${(p.tags||[]).map(t=>`<span style="background:rgba(173,255,47,0.2);padding:0.2rem 0.6rem;border-radius:12px;font-size:0.7rem">#${san(t)}</span>`).join(' ')}</div>
                    <div onclick="viewProfileSlide('${p.authorId}')" style="display:flex;align-items:center;gap:0.5rem;cursor:pointer">
                        <img src="${p.authorPic||'https://placehold.co/34'}" style="width:34px;height:34px;border-radius:50%;border:2px solid var(--accent)">
                        <div>
                            <div style="font-weight:700;color:white">${san(p.authorName)}</div>
                            <div style="font-size:0.7rem;color:rgba(255,255,255,0.6)">${p.songTitle ? '🎵 '+san(p.songTitle) : ''}</div>
                        </div>
                    </div>
                </div>
                <div class="reel-actions">
                    <div class="reel-action" onclick="likePost('${id}')"><div class="icon-circle"><i class="fa fa-heart"></i></div><span>${p.likes||0}</span></div>
                    <div class="reel-action" onclick="toggleComments('${id}')"><div class="icon-circle"><i class="fa fa-comment"></i></div></div>
                    <div class="reel-action" onclick="shareToGallery('${id}')"><div class="icon-circle"><i class="fa fa-share-nodes"></i></div><span>Share</span></div>
                    <div class="reel-action" onclick="savePost('${id}')"><div class="icon-circle"><i class="fa fa-bookmark"></i></div></div>
                </div>
                <div class="comments-panel" id="c_${id}">
                    <div style="display:flex;justify-content:space-between;padding:0.5rem"><h4>Comments</h4><button onclick="toggleComments('${id}')" style="background:none;border:none;color:white;font-size:1.2rem">✕</button></div>
                    <div id="cl_${id}" style="flex:1;overflow-y:auto;padding:0 0.5rem"></div>
                    <div style="display:flex;gap:0.5rem;padding:0.5rem">
                        <input id="ci_${id}" placeholder="Add comment..." style="flex:1;padding:0.5rem;border-radius:15px;border:1px solid rgba(255,255,255,0.2);background:rgba(0,0,0,0.3);color:white" onkeypress="if(event.key==='Enter')addComment('${id}')">
                        <button onclick="addComment('${id}')" style="background:var(--accent);color:#000;border:none;border-radius:50%;width:34px;height:34px"><i class="fa fa-paper-plane"></i></button>
                    </div>
                </div>
            </div>`;
        }

        function updateReelCounter() {
            const counter = document.getElementById('reelCounter');
            if (counter) counter.innerText = `${reelIndex+1}/${allPosts.length}`;
        }

        function startProgressSimulation() {
            clearInterval(reelProgressInterval);
            const total = allPosts.length;
            if (total === 0) return;
            let progress = 0;
            reelProgressInterval = setInterval(() => {
                progress += 0.5;
                if (progress >= 100) {
                    progress = 0;
                    reelIndex = (reelIndex + 1) % total;
                    updateReelCounter();
                    const reelEls = document.querySelectorAll('.reel-slide');
                    if (reelEls[reelIndex]) reelEls[reelIndex].scrollIntoView({ behavior: 'smooth' });
                }
                const currentReel = allPosts[reelIndex];
                if (currentReel) {
                    const fill = document.getElementById(`progress-${currentReel.id}`);
                    if (fill) fill.style.width = progress + '%';
                }
            }, 50);
        }
